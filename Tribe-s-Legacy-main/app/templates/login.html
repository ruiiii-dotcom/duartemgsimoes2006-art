<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <title>Entrar na Tribo</title>
</head>
<body style="font-family: Arial, sans-serif; text-align: center; margin-top: 50px; background-color: #f4f4f9;">
<body>
   
    <h1>Entrar na Tribo 🦣</h1>
    
    <div style="border: 2px solid #8b5a2b; display: inline-block; padding: 30px; background-color: #fff; border-radius: 8px;">
        <form method="POST" action="/login">
            
            <label for="username">Nome da Tribo:</label><br>
            <input type="text" id="username" name="username" required style="margin-bottom: 15px; padding: 5px;"><br>
            
            <label for="password">Palavra-passe:</label><br>
            <input type="password" id="password" name="password" required style="margin-bottom: 20px; padding: 5px;"><br>
            
            <button type="submit" style="padding: 10px 20px; background-color: #8b5a2b; color: white; border: none; cursor: pointer; font-size: 16px;">Entrar</button>
        </form>
        <br>
        <a href="/registo" style="color: #666;">Ainda não tens uma tribo? Regista-te aqui.</a>
    </div>

</body>
</html>
